<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastApiCloud | پنل مدیریت کانفیگ WS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0b1a;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --text: #f5f3ff;
  --muted: #9ca3af;
  --primary: #8b5cf6;
  --accent: #ec4899;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}
body {
  font-family: 'Vazirmatn', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(139,92,246,0.15), transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(236,72,153,0.1), transparent 50%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}
a { color: var(--primary); text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, select, textarea {
  font-family: inherit; background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 12px; width: 100%; outline: none;
  transition: all 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary); background: rgba(255,255,255,0.08);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
}
.glass {
  background: var(--card); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 20px;
}
.btn {
  padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 13px;
  display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
  border: none;
}
.btn-primary {
  background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white;
  box-shadow: 0 4px 16px rgba(139,92,246,0.3);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
}
.btn-ghost:hover { background: rgba(255,255,255,0.1); }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: white; }

#app { display: flex; min-height: 100vh; }
.sidebar { width: 250px; padding: 20px; position: sticky; top: 0; height: 100vh; }
.main { flex: 1; padding: 24px; max-width: 100%; overflow-x: hidden; }

.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
.logo-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
  color: var(--muted); font-size: 13px;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.1));
  color: var(--text); border: 1px solid rgba(139,92,246,0.3);
}

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { padding: 20px; }
.stat-card .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .icon { font-size: 20px; margin-bottom: 8px; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border); font-size: 13px; }
th { color: var(--muted); font-weight: 500; }
tr:hover { background: rgba(255,255,255,0.02); }

.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; }
.badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
.badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
.badge-info { background: rgba(139,92,246,0.15); color: var(--primary); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
}
.modal {
  background: #1a1726; border: 1px solid var(--border); border-radius: 20px;
  padding: 24px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-close { background: none; color: var(--muted); font-size: 24px; padding: 0; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #1a1726; border: 1px solid var(--border); padding: 12px 24px;
  border-radius: 12px; z-index: 200; animation: slideDown 0.3s;
}
.toast-success { border-color: var(--success); color: var(--success); }
.toast-error { border-color: var(--danger); color: var(--danger); }
@keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

.login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { padding: 40px; max-width: 400px; width: 100%; }
.login-logo {
  width: 72px; height: 72px; margin: 0 auto 20px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 36px;
}

.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

.icon-btn {
  background: none; padding: 6px; border-radius: 8px; color: var(--muted);
  display: inline-flex; align-items: center; justify-content: center;
  border: none;
}
.icon-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.server-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

.qr-container { background: white; padding: 20px; border-radius: 16px; display: inline-block; }
.qr-container img { display: block; }

.loading { padding: 40px; text-align: center; color: var(--muted); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ============================================================================
// State
// ============================================================================
let state = {
  admin: null,
  tab: 'dashboard',
  configs: [],
  servers: [],
  users: [],
  stats: null,
  xrayStatus: null,
};

// ============================================================================
// API helpers
// ============================================================================
async function api(path, options = {}) {
  try {
    const opts = { ...options, headers: { 'Content-Type': 'application/json', ...(options.headers||{}) } };
    if (options.body) opts.body = JSON.stringify(options.body);
    const res = await fetch(path, opts);
    const data = await res.json();
    return data;
  } catch (e) {
    console.error('API error:', path, e);
    return { ok: false, error: 'خطای شبکه' };
  }
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================================
// Auth
// ============================================================================
async function checkAuth() {
  const data = await api('/api/auth/check');
  state.admin = data.ok ? data.admin : null;
  render();
}

async function login(username, password) {
  const data = await api('/api/auth/login', { method: 'POST', body: { username, password } });
  if (data.ok) {
    state.admin = data.admin;
    // Load dashboard data right after login
    await loadStats();
    render();
    toast('خوش آمدید!');
  } else {
    toast(data.error || 'ورود ناموفق', 'error');
  }
}

async function logout() {
  await api('/api/auth/logout', { method: 'POST' });
  state.admin = null;
  state.stats = null;
  state.configs = [];
  render();
}

// ============================================================================
// Data loaders (all return promises)
// ============================================================================
async function loadConfigs() {
  const data = await api('/api/configs');
  if (data.ok) state.configs = data.configs || [];
}
async function loadServers() {
  const data = await api('/api/servers');
  if (data.ok) state.servers = data.servers || [];
}
async function loadUsers() {
  const data = await api('/api/users');
  if (data.ok) state.users = data.users || [];
}
async function loadStats() {
  const data = await api('/api/stats');
  if (data.ok) state.stats = data.stats;
}
async function loadXrayStatus() {
  const data = await api('/api/xray/status');
  if (data.ok) state.xrayStatus = data.status;
}

// ============================================================================
// Format helpers
// ============================================================================
function toPersian(n) { return String(n||0).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]); }
function formatBytes(b) {
  b = Number(b)||0;
  if (!b) return '۰ بایت';
  const u = ['بایت','کیلوبایت','مگابایت','گیگابایت','ترابایت'];
  const i = Math.floor(Math.log(b)/Math.log(1024));
  return (b/Math.pow(1024,i)).toFixed(1) + ' ' + u[i];
}
function formatDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleString('fa-IR'); } catch { return s; }
}
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================================
// Render
// ============================================================================
function render() {
  const root = document.getElementById('root');
  if (!state.admin) {
    root.innerHTML = renderLogin();
    return;
  }
  root.innerHTML = renderApp();
}

function renderLogin() {
  return `
  <div class="login-wrapper">
    <div class="glass login-card">
      <div class="login-logo">☁️</div>
      <h2 style="text-align:center; margin-bottom:8px; background:linear-gradient(135deg,#8b5cf6,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">FastApiCloud</h2>
      <p style="text-align:center; color:var(--muted); margin-bottom:30px; font-size:13px;">پنل مدیریت کانفیگ‌های WS</p>
      <form onsubmit="event.preventDefault(); login(this.username.value, this.password.value)">
        <div class="form-group">
          <label>نام کاربری</label>
          <input name="username" value="admin" dir="ltr" autocomplete="username">
        </div>
        <div class="form-group">
          <label>رمز عبور</label>
          <input name="password" type="password" value="admin123" dir="ltr" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">ورود به پنل</button>
      </form>
      <p style="text-align:center; margin-top:20px; font-size:11px; color:var(--muted);">
        پیش‌فرض: <span dir="ltr" style="font-family:monospace">admin / admin123</span>
      </p>
    </div>
  </div>`;
}

function renderApp() {
  return `
  <div id="app">
    ${renderSidebar()}
    <div class="main">
      ${renderTab()}
    </div>
  </div>`;
}

function renderSidebar() {
  const tabs = [
    { id: 'dashboard', label: 'داشبورد', icon: '📊' },
    { id: 'configs', label: 'کانفیگ‌ها', icon: '⚙️' },
    { id: 'servers', label: 'سرورها', icon: '🌐' },
    { id: 'users', label: 'کاربران', icon: '👥' },
    { id: 'xray', label: 'سرور Xray', icon: '⚡' },
    { id: 'settings', label: 'تنظیمات', icon: '🔧' },
  ];
  return `
  <aside class="sidebar glass">
    <div class="logo">
      <div class="logo-icon">☁️</div>
      <div>
        <div style="font-weight:700;">FastApiCloud</div>
        <div style="font-size:11px; color:var(--muted);">پنل مدیریت WS</div>
      </div>
    </div>
    ${tabs.map(t => `
      <div class="nav-item ${state.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
        <span>${t.icon}</span>
        <span>${t.label}</span>
      </div>
    `).join('')}
    <div style="margin-top:30px; padding-top:20px; border-top:1px solid var(--border);">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
        <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#8b5cf6,#ec4899); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;">${escapeHtml(state.admin.username.slice(0,2).toUpperCase())}</div>
        <div>
          <div style="font-size:13px; font-weight:600;">${escapeHtml(state.admin.username)}</div>
          <div style="font-size:11px; color:var(--muted);" dir="ltr">${escapeHtml(state.admin.email||'')}</div>
        </div>
      </div>
      <button class="btn btn-ghost" style="width:100%; justify-content:center; font-size:12px;" onclick="logout()">خروج</button>
    </div>
  </aside>`;
}

async function setTab(id) {
  state.tab = id;
  // Render immediately with loading state
  render();
  // Load data, then render again
  try {
    if (id === 'dashboard') await loadStats();
    else if (id === 'configs') await loadConfigs();
    else if (id === 'servers') await loadServers();
    else if (id === 'users') await loadUsers();
    else if (id === 'xray') await loadXrayStatus();
  } catch (e) {
    console.error('Load error:', e);
  }
  render();
}

function renderTab() {
  switch(state.tab) {
    case 'dashboard': return renderDashboard();
    case 'configs': return renderConfigs();
    case 'servers': return renderServers();
    case 'users': return renderUsers();
    case 'xray': return renderXray();
    case 'settings': return renderSettings();
    default: return renderDashboard();
  }
}

// ============================================================================
// Dashboard
// ============================================================================
function renderDashboard() {
  const s = state.stats;
  if (!s) return '<div class="glass loading">در حال بارگذاری داشبورد...</div>';

  const totalConfigs = (s.configs && s.configs.total) || 0;
  const activeConfigs = (s.configs && s.configs.active) || 0;
  const totalServers = (s.servers && s.servers.total) || 0;
  const totalUsers = (s.users && s.users.total) || 0;
  const xray = s.xray || {};
  const recentLogs = s.recentLogs || [];
  const showSeed = totalConfigs === 0 && state.configs.length === 0;

  return `
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <div>
      <h1 style="font-size:24px; margin-bottom:4px;">داشبورد</h1>
      <p style="color:var(--muted); font-size:13px;">نمای کلی سیستم</p>
    </div>
    ${showSeed ? `<button class="btn btn-primary" onclick="seedData()">بارگذاری داده‌های نمونه</button>` : ''}
  </div>
  <div class="stat-grid">
    <div class="glass stat-card">
      <div class="icon">⚙️</div>
      <div class="label">کل کانفیگ‌ها</div>
      <div class="value">${toPersian(totalConfigs)}</div>
    </div>
    <div class="glass stat-card">
      <div class="icon">✅</div>
      <div class="label">کانفیگ‌های فعال</div>
      <div class="value" style="color:var(--success);">${toPersian(activeConfigs)}</div>
    </div>
    <div class="glass stat-card">
      <div class="icon">🌐</div>
      <div class="label">سرورها</div>
      <div class="value">${toPersian(totalServers)}</div>
    </div>
    <div class="glass stat-card">
      <div class="icon">👥</div>
      <div class="label">کاربران</div>
      <div class="value">${toPersian(totalUsers)}</div>
    </div>
  </div>
  <div class="glass" style="padding:20px; margin-bottom:24px;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
      <div style="width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,${xray.running?'#10b981':'#6b7280'},${xray.running?'#059669':'#4b5563'}); display:flex; align-items:center; justify-content:center; font-size:20px;">⚡</div>
      <div>
        <div style="font-weight:600;">سرور Xray محلی</div>
        <div style="font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px;">
          <span class="pulse" style="width:8px; height:8px; border-radius:50%; background:${xray.running?'var(--success)':'var(--muted)'}; display:inline-block;"></span>
          ${xray.running ? `در حال اجرا — ${toPersian(xray.client_count||0)} کلاینت` : 'متوقف'}
        </div>
      </div>
    </div>
    ${!xray.running ? `<button class="btn btn-success" onclick="startXray()">اجرای Xray</button>` : ''}
  </div>
  <div class="glass" style="padding:20px;">
    <h3 style="margin-bottom:16px;">فعالیت‌های اخیر</h3>
    ${recentLogs.length === 0 ? '<p style="color:var(--muted); text-align:center; padding:20px;">هنوز فعالیتی ثبت نشده</p>' :
      recentLogs.map(l => `
        <div style="display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border);">
          <div style="width:32px; height:32px; border-radius:8px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:14px;">
            ${(l.action||'').includes('create')?'➕':(l.action||'').includes('delete')?'🗑️':(l.action||'').includes('xray')?'⚡':'✏️'}
          </div>
          <div style="flex:1;">
            <div style="font-size:13px;">${escapeHtml(l.detail||l.action||'')}</div>
            <div style="font-size:11px; color:var(--muted);">${formatDate(l.created_at)}</div>
          </div>
        </div>
      `).join('')
    }
  </div>`;
}

async function seedData() {
  const data = await api('/api/seed', { method: 'POST' });
  if (data.ok) {
    toast('داده‌های نمونه ایجاد شد');
    await loadStats();
    render();
  } else {
    toast(data.error || 'خطا', 'error');
  }
}

async function startXray() {
  const data = await api('/api/xray/start', { method: 'POST' });
  if (data.ok) {
    toast('Xray اجرا شد');
    await loadStats();
    render();
  } else {
    toast(data.error || 'خطا', 'error');
  }
}

// ============================================================================
// Configs
// ============================================================================
function renderConfigs() {
  return `
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <div>
      <h1 style="font-size:24px; margin-bottom:4px;">مدیریت کانفیگ‌ها</h1>
      <p style="color:var(--muted); font-size:13px;">${toPersian(state.configs.length)} کانفیگ</p>
    </div>
    <button class="btn btn-primary" onclick="showConfigForm()">➕ ساخت کانفیگ</button>
  </div>
  <div class="glass" style="overflow:hidden;">
    ${state.configs.length === 0 ? '<div class="loading">هیچ کانفیگی یافت نشد</div>' : `
    <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>نام</th><th>نوع</th><th>سرور</th><th>وضعیت</th><th>Xray</th><th style="text-align:center;">عملیات</th>
        </tr>
      </thead>
      <tbody>
        ${state.configs.map(c => `
          <tr>
            <td><div style="font-weight:600;">${escapeHtml(c.name)}</div><div style="font-size:11px; color:var(--muted); font-family:monospace;" dir="ltr">${escapeHtml((c.uuid||'').slice(0,8))}...</div></td>
            <td><span class="badge badge-info">${escapeHtml((c.type||'').toUpperCase())}</span></td>
            <td><div style="font-size:12px;">${escapeHtml(c.server_name||'—')}</div><div style="font-size:11px; color:var(--muted); font-family:monospace;" dir="ltr">${escapeHtml(c.server_host||'')}:${c.port||443}</div></td>
            <td>${c.status==='active'?'<span class="badge badge-success">فعال</span>':c.status==='disabled'?'<span class="badge badge-warning">غیرفعال</span>':'<span class="badge badge-danger">منقضی</span>'}</td>
            <td>${c.xray_active?'<span class="badge badge-success">فعال</span>':'<span class="badge badge-warning">غیرفعال</span>'}</td>
            <td style="text-align:center; white-space:nowrap;">
              <button class="icon-btn" onclick="showQR('${c.id}')" title="QR">📱</button>
              <button class="icon-btn" onclick="showShareLink('${c.id}')" title="لینک">🔗</button>
              <button class="icon-btn" onclick="showConfigForm('${c.id}')" title="ویرایش">✏️</button>
              <button class="icon-btn" onclick="deleteConfig('${c.id}')" title="حذف">🗑️</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    </div>
    `}
  </div>`;
}

async function showConfigForm(id) {
  // Make sure servers and users are loaded first
  if (state.servers.length === 0) await loadServers();
  if (state.users.length === 0) await loadUsers();

  const c = id ? state.configs.find(x => x.id === id) : null;
  const currentType = c?.type || 'vmess';

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
  <div class="modal">
    <div class="modal-header">
      <h3>${c?'ویرایش':'ساخت'} کانفیگ</h3>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <form id="configForm">
      <div class="form-group">

function selectType(t) {
  // Update hidden input
  document.querySelector('#configForm input[name="type"]').value = t;
  // Update button styles
  document.querySelectorAll('#typeButtons button').forEach(btn => {
    if (btn.dataset.type === t) {
      btn.style.background = 'linear-gradient(135deg,#8b5cf6,#ec4899)';
      btn.style.color = 'white';
    } else {
      btn.style.background = 'var(--card)';
      btn.style.color = 'var(--text)';
    }
  });
}

function generateUuid(btn) {
  // Simple UUID v4 generator (works without crypto.randomUUID)
  let uuid;
  if (window.crypto && window.crypto.randomUUID) {
    uuid = window.crypto.randomUUID();
  } else {
    uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(cc) {
      const r = Math.random() * 16 | 0;
      const v = cc === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  btn.previousElementSibling.value = uuid;
}

async function saveConfig(form, id) {
  const data = {
    name: form.name.value,
    type: form.type.value,
    serverId: form.serverId.value,
    port: Number(form.port.value),
    uuid: form.uuid.value,
    status: form.status.value,
    assignedUserId: form.assignedUserId.value || null,
  };
  if (!data.name) { toast('نام الزامی است', 'error'); return; }
  if (!data.serverId) { toast('سرور الزامی است', 'error'); return; }

  const url = id ? `/api/configs/${id}` : '/api/configs';
  const method = id ? 'PUT' : 'POST';
  const res = await api(url, { method, body: data });
  if (res.ok) {
    form.closest('.modal-overlay').remove();
    toast(id ? 'کانفیگ به‌روزرسانی شد' : 'کانفیگ ساخته شد');
    await loadConfigs();
    render();
  } else {
    toast(res.error || 'خطا', 'error');
  }
}

// ============================================================================
// Init
// ============================================================================
checkAuth();

// Auto-refresh for dashboard and xray tabs
setInterval(async () => {
  if (!state.admin) return;
  if (state.tab === 'dashboard') {
    await loadStats();
    render();
  } else if (state.tab === 'xray') {
    await loadXrayStatus();
    render();
  }
}, 10000);

// Attach password form handler dynamically
document.addEventListener('submit', async function(e) {
  if (e.target.id === 'passwordForm') {
    e.preventDefault();
    const res = await api('/api/auth/password', { method: 'POST', body: { newPassword: e.target.newPassword.value } });
    if (res.ok) { toast('رمز تغییر کرد'); e.target.reset(); }
    else toast(res.error || 'خطا', 'error');
  }
});
</script>
