# =============================================================================
# docker-compose.yml - For LOCAL testing before pushing to Bunnyshell
# =============================================================================
version: "3.8"

services:
  xray-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-custom-panel-local
    hostname: xray-panel
    restart: unless-stopped

    environment:
      - XRAY_PORT=80
      - PANEL_PORT=5000
      - XRAY_WS_PATH=/vless
      - ADMIN_USER=admin
      - ADMIN_PASS=ChangeMeNow_StrongPass_2025
      - PANEL_SECRET=LocalDevSecret_2025
      - PUBLIC_DOMAIN=localhost
      - TZ=Asia/Tehran

    ports:
      - "80:80"

    volumes:
      - panel_db:/data
      - xray_logs:/var/log/xray

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  panel_db:
    driver: local
  xray_logs:
    driver: local
