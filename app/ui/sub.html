<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>اشتراک Aurora</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#2dd4bf;--cyan:#22d3ee;--emerald:#34d399;--rose:#fb7185;--amber:#fbbf24}
body{font-family:'Vazirmatn',system-ui,sans-serif;background:#070b16;color:#e8eef9;direction:rtl;min-height:100vh;display:grid;place-items:center;padding:18px;overflow-x:hidden}
body::before,body::after{content:"";position:fixed;z-index:-1;filter:blur(95px);opacity:.5;border-radius:50%;animation:drift 20s ease-in-out infinite}
body::before{width:55vw;height:55vw;top:-18vw;right:-12vw;background:radial-gradient(circle,#0ea5a4,transparent 64%)}
body::after{width:48vw;height:48vw;bottom:-16vw;left:-10vw;background:radial-gradient(circle,#1e6fd9,transparent 64%);animation-delay:-7s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3vw,4vh) scale(1.12)}}
.wrap{width:min(96vw,460px);animation:rise .6s ease}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.card{background:rgba(17,25,44,.7);backdrop-filter:blur(18px);border:1px solid rgba(148,163,184,.16);border-radius:24px;padding:26px 22px;box-shadow:0 22px 60px rgba(2,6,18,.6);margin-bottom:14px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#2dd4bf,#22d3ee);display:grid;place-items:center;box-shadow:0 8px 26px rgba(45,212,191,.4);flex:none}
.logo svg{width:26px;height:26px;stroke:#04121a;fill:none;stroke-width:2.2}
.head h1{font-size:19px;font-weight:800}.head p{font-size:12.5px;color:#8b99b4}
.badge{font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:999px;margin-inline-start:auto}
.badge.active{background:rgba(52,211,153,.16);color:var(--emerald)}
.badge.expired{background:rgba(251,113,133,.16);color:var(--rose)}
.badge.disabled{background:rgba(148,163,184,.16);color:#8b99b4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.stat{background:rgba(8,14,28,.55);border:1px solid rgba(148,163,184,.12);border-radius:16px;padding:14px}
.stat .l{font-size:12px;color:#8b99b4}.stat .v{font-size:20px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
.track{height:9px;border-radius:999px;background:rgba(148,163,184,.14);overflow:hidden;margin-bottom:18px}
.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#2dd4bf,#22d3ee);transition:width .8s ease}
.fill.rose{background:linear-gradient(90deg,#fb7185,#f43f5e)}
.qr{background:#fff;border-radius:18px;padding:14px;width:max-content;margin:0 auto 18px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.qr svg{width:200px;height:200px;display:block}
.label{font-size:12.5px;color:#8b99b4;margin-bottom:7px;display:block}
.code{background:#060b18;border:1px solid rgba(148,163,184,.14);border-radius:12px;padding:11px 13px;font-family:ui-monospace,monospace;font-size:11.5px;word-break:break-all;color:#9fb3d1;direction:ltr;text-align:left;margin-bottom:9px;max-height:74px;overflow:auto}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;border-radius:13px;padding:13px;color:#04121a;background:linear-gradient(135deg,#2dd4bf,#22d3ee);width:100%;transition:.18s;margin-bottom:9px}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(45,212,191,.35)}
.btn.ghost{background:transparent;color:#e8eef9;border:1px solid rgba(148,163,184,.22)}
.btn.sm{font-size:12.5px;padding:9px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cfg{margin-top:8px}.cfg .label{margin-top:12px}
.foot{text-align:center;font-size:11px;color:#5b6880;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4z"/><path d="m9 12 2 2 4-4"/></svg></div>
      <div><h1 id="lbl">اشتراک شما</h1><p>Aurora · سرویس اتصال امن</p></div>
      <span class="badge" id="st"></span>
    </div>
    <div class="stats">
      <div class="stat"><div class="l">مصرف</div><div class="v" id="used">—</div></div>
      <div class="stat"><div class="l">زمان باقی‌مانده</div><div class="v" id="days">—</div></div>
    </div>
    <div class="track" id="track-wrap"><div class="fill" id="bar" style="width:0%"></div></div>
    <div class="qr" id="qr"></div>
    <span class="label">لینک اشتراک — در اپلیکیشن paste کنید</span>
    <div class="code" id="sub"></div>
    <button class="btn" id="copySub">📋 کپی لینک اشتراک</button>
    <div class="row">
      <button class="btn ghost sm" id="toNg">افزودن به v2rayNG</button>
      <button class="btn ghost sm" id="toClash">افزودن به Clash</button>
    </div>
    <div class="cfg" id="cfgs"></div>
  </div>
  <div class="foot">Powered by Aurora Edge v2.0</div>
</div>
<script>
/*__SUB_DATA__*/
const D = window.__SUB__ || {};
const FA="۰۱۲۳۴۵۶۷۸۹", toFa=s=>String(s).replace(/\d/g,d=>FA[d]);
function fmtBytes(n){n=Number(n||0);const u=["B","KB","MB","GB","TB"];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return toFa((i===0?n.toFixed(0):n.toFixed(2)))+" "+u[i];}
document.getElementById("lbl").textContent = D.label || "اشتراک شما";
const st=document.getElementById("st");
st.textContent = ({active:"فعال",expired:"منقضی",disabled:"غیرفعال"})[D.status]||"فعال";
st.className = "badge "+(D.status||"active");
document.getElementById("used").textContent = D.quota ? fmtBytes(D.used)+" / "+fmtBytes(D.quota) : fmtBytes(D.used);
document.getElementById("days").textContent = !D.expiry ? "نامحدود" : (D.days_left>0?toFa(D.days_left)+" روز":"منقضی");
if(D.quota){const p=Math.min(100,D.used/D.quota*100);const bar=document.getElementById("bar");bar.style.width=p+"%"; if(p>90)bar.classList.add("rose");} else document.getElementById("track-wrap").style.display="none";
document.getElementById("qr").innerHTML = D.qr || "";
document.getElementById("sub").textContent = D.sub_link || "";
const cfgs=document.getElementById("cfgs");
cfgs.innerHTML = (D.links||[]).map((lnk,i)=>{
  const name=/Reality/.test(lnk)?"Reality (پرسرعت)":(/WS-Main/.test(lnk)?"WebSocket (اصلی)":`WebSocket (${lnk.split("@")[1].split(":")[0]})`);
  return `<span class="label">${name}</span><div class="code" id="c${i}">${lnk.replace(/</g,"&lt;")}</div><button class="btn ghost sm" data-c="c${i}">کپی این کانفیگ</button>`;
}).join("");
function copy(t){navigator.clipboard.writeText(t).then(()=>flash("کپی شد ✅")).catch(()=>{const a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();document.execCommand("copy");a.remove();flash("کپی شد ✅");});}
function flash(m){const b=event.target.closest("button");if(!b)return;const o=b.textContent;b.textContent=m;setTimeout(()=>b.textContent=o,1400);}
document.getElementById("copySub").onclick=()=>copy(D.sub_link);
document.getElementById("toNg").onclick=()=>{location.href="v2rayng://install-sub?url="+encodeURIComponent(D.sub_link)+"&name="+encodeURIComponent(D.label||"Aurora");};
document.getElementById("toClash").onclick=()=>{location.href="clash://install-config?url="+encodeURIComponent(D.sub_link)+"&name=Aurora";};
document.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>copy(document.getElementById(b.dataset.c).textContent));
</script>
</body>
</html>
