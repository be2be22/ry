<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ورود</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="auth">
  <form class="auth-card" id="f" autocomplete="off">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4z"/><path d="m9 12 2 2 4-4"/>
        </svg>
      </div>
      <h1>Aurora</h1>
    </div>
    <p class="sub">برای ورود به پنل مدیریت، رمز عبور را وارد کنید</p>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="pw" placeholder="••••••••" autofocus>
    </div>
    <button class="btn" type="submit" id="b">ورود</button>
    <div class="err" id="e"></div>
  </form>
</div>
<script>
const base = location.pathname.replace(/\/$/,'');
const f=document.getElementById('f'), b=document.getElementById('b'), e=document.getElementById('e');
f.addEventListener('submit', async ev=>{
  ev.preventDefault(); e.textContent=''; b.disabled=true; b.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch(base+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:document.getElementById('pw').value})});
    if(r.ok){ location.reload(); return; }
    const d=await r.json().catch(()=>({})); e.textContent=d.detail||'خطا در ورود';
  }catch(_){ e.textContent='خطای شبکه'; }
  b.disabled=false; b.textContent='ورود';
});
</script>
</body>
</html>
