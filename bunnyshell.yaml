# =============================================================================
# bunnyshell.yaml - Custom Lightweight Xray Panel for Bunnyshell
# Single port (80): Xray + Flask panel via fallback
# =============================================================================
version: "1.3"

name: xray-custom-panel
description: "Lightweight Xray panel with Farsi UI + live logs (single port)"

labels:
  - xray
  - vpn
  - panel
  - farsi

components:
  - name: xray-panel
    image:
      imageType: dockerfile
      dockerfilePath: ./Dockerfile
      buildContext: .

    deployment:
      create: true
      replicas: 1
      strategy:
        type: Recreate

    pod:
      forceRestart: true

    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 128Mi

    # ---- SINGLE PUBLIC PORT (this is the key!) -------------------------------
    # Bunnyshell's ingress terminates TLS at the edge and forwards plaintext
    # HTTP to the container on port 80.
    # Inside the container, Xray listens on 80 and handles:
    #   - WebSocket traffic on /vless → VLESS proxy
    #   - Everything else → fallback to Flask panel on 127.0.0.1:5000
    ports:
      - name: panel-web
        port: 80
        type: public
        protocol: HTTP

    variables:
      - name: XRAY_PORT
        value: "80"
        type: VAR
      - name: PANEL_PORT
        value: "5000"
        type: VAR
      - name: XRAY_WS_PATH
        value: "/vless"
        type: VAR
      - name: ADMIN_USER
        value: "admin"
        type: VAR
      - name: ADMIN_PASS
        value: "ChangeMeNow_StrongPass_2025"
        type: SECRET
      - name: PANEL_SECRET
        value: "ChangeThisSecretInProduction_2025_x9k2"
        type: SECRET
      # CRITICAL: Set this to your Bunnyshell domain so links are correct
      - name: PUBLIC_DOMAIN
        value: "xui-panel-zpx2ic.bunnyenv.com"
        type: VAR
      - name: TZ
        value: "Asia/Tehran"
        type: VAR

    volumes:
      - name: panel-db
        path: /data
        size: 1Gi
        storageClass: standard
      - name: xray-logs
        path: /var/log/xray
        size: 500Mi
        storageClass: standard

    healthCheck:
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 90
        periodSeconds: 60
        timeoutSeconds: 10
        failureThreshold: 3
