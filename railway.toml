[build]
builder = "dockerfile"
# Only redeploy when real application code changes. This is a second line of
# defence against the redeploy loop: even if GH_REPO is ever pointed at THIS
# repo, the state pushes touch only state/** (or live in a separate repo) and
# never match these patterns, so Railway will not redeploy on every backup.
watchPatterns = [
    "app/**",
    "tools/**",
    "main.py",
    "Dockerfile",
    "start.sh",
    "nginx.conf",
    "requirements.txt",
    "railway.toml",
]

[deploy]
startCommand = "/app/start.sh"
healthcheckPath = "/up"
# Generous timeout: first boot may pull state from GitHub before serving.
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
