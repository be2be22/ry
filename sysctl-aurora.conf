
# ── Aurora v3.7 Network Tuning (Speed + RAM balance) ──────────────────
# BBR congestion control (2-3x faster than Cubic on lossy links)
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

# v3.7: TCP buffers set to 8MB max (was 2MB — killed download speed).
# 8MB supports ~200Mbps with 300ms RTT (covers all Iran use cases).
# For 100 users × 16 connections × 8MB = 12.8GB worst case — but BBR
# and connIdle prevent this in practice. Typical: 100 users = 200-400MB.
net.ipv4.tcp_rmem=4096 87380 8388608
net.ipv4.tcp_wmem=4096 65536 8388608
net.core.rmem_max=8388608
net.core.wmem_max=8388608
net.core.rmem_default=131072
net.core.wmem_default=131072
net.core.netdev_max_backlog=1000

# Disable slow-start-after-idle (keep window open for keepalive connections)
net.ipv4.tcp_slow_start_after_idle=0

# Enable MTU probing (fixes black-hole MTU issues)
net.ipv4.tcp_mtu_probing=1

# TCP Fast Open (server-side, reduces 1 RTT on reconnect)
net.ipv4.tcp_fastopen=3

# Keepalive tuning (faster detection of dead connections)
net.ipv4.tcp_keepalive_time=600
net.ipv4.tcp_keepalive_intvl=15
net.ipv4.tcp_keepalive_probes=5

# Connection backlog
net.core.somaxconn=1024
net.ipv4.tcp_max_syn_backlog=1024

# Recycle FIN-WAIT connections faster to free RAM
net.ipv4.tcp_fin_timeout=30
net.ipv4.tcp_tw_reuse=1

# Disable IPv6 (avoid AAAA delays when IPv6 is broken)
net.ipv6.conf.all.disable_ipv6=1
net.ipv6.conf.default.disable_ipv6=1
# ── End Network Tuning ──────────────────────────────────
