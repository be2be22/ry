# Aurora edge router — multiplexes the single public HTTP port.
# v3.5: Ultra-low RAM for 100+ concurrent users.
worker_processes 1;
worker_rlimit_nofile 65535;
pid /tmp/ngx.pid;
error_log /tmp/ngx_err.log warn;

events {
    # v3.7: 8192 connections (was 4096) — supports more parallel streams
    # Each connection uses ~2KB RAM, so 8192 = ~16MB total (acceptable).
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    # v3.7: Increased keepalive (was 30s) — shorter kills download speed
    # because clients must re-establish TLS for each request.
    keepalive_timeout 120;
    keepalive_requests 1000;
    reset_timedout_connection on;
    server_tokens off;

    # ── v3.2: TLS optimization ───────────────────────────────────────
    # TLS 1.3 only (1 RTT handshake, vs 2 for TLS 1.2)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    # 0-RTT early data (saves 1 RTT on reconnect — huge for mobile)
    ssl_early_data on;
    # Session cache (avoid full handshake on reconnect)
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 24h;
    ssl_session_tickets on;
    # OCSP stapling (faster TLS validation on client)
    ssl_stapling on;
    ssl_stapling_verify on;
    # Larger TLS buffer for initial handshake (fewer round-trips)
    ssl_buffer_size 4k;

    # ── v3.2: Buffer tuning for streaming throughput ────────────────
    client_body_buffer_size 16k;
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    # Large output buffers for high-throughput transfers
    output_buffers 2 64k;
    postpone_output 0;

    # Security headers applied at nginx level (defense in depth with app middleware)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_body_temp_path /tmp/ngx_cbt;
    proxy_temp_path        /tmp/ngx_pt;
    fastcgi_temp_path      /tmp/ngx_fct;
    uwsgi_temp_path        /tmp/ngx_ut;
    scgi_temp_path         /tmp/ngx_st;

    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;

    upstream cp_backend { server 127.0.0.1:5000;  keepalive 32; }
    upstream tx_ws      { server 127.0.0.1:18080; keepalive 32; }
    upstream tx_grpc    { server 127.0.0.1:18081; keepalive 32; }

    map $http_upgrade $conn_up { default upgrade; '' close; }

    server {
        listen PORT_PLACEHOLDER;
        # HTTP/2 is required for gRPC transport (grpc_pass needs HTTP/2 client)
        http2 on;
        server_name _;

        # WebSocket transport endpoint (VLESS + WS + TLS)
        location /ws {
            access_log off;
            proxy_pass http://tx_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $conn_up;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Disable buffering for real-time streaming
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # gRPC transport endpoint (VLESS + gRPC + TLS)
        # gRPC requires HTTP/2 + keepalive for multiplexed streams.
        location /grpc {
            access_log off;
            grpc_pass grpc://tx_grpc;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $http_x_forwarded_for;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Keep connection alive for long-lived streams
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            grpc_connect_timeout 10s;
            # grpc_socket_keepalive enables TCP keepalive on the upstream connection
            grpc_socket_keepalive on;
        }

        # Control plane (dashboard, api, subscriptions, static, health)
        location / {
            proxy_pass http://cp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass early-data header for TLS 0-RTT (lets app detect replays)
            proxy_set_header Early-Data $ssl_early_data;
        }
    }
}
