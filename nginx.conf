# Aurora edge router — multiplexes the single public HTTP port.
# v3.1: added gRPC transport (HTTP/2) for VLESS+gRPC+TLS.
worker_processes 1;
worker_rlimit_nofile 65535;
pid /tmp/ngx.pid;
error_log /tmp/ngx_err.log warn;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60;
    keepalive_requests 1000;
    reset_timedout_connection on;
    server_tokens off;

    # Security headers applied at nginx level (defense in depth with app middleware)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_body_temp_path /tmp/ngx_cbt;
    proxy_temp_path        /tmp/ngx_pt;
    fastcgi_temp_path      /tmp/ngx_fct;
    uwsgi_temp_path        /tmp/ngx_ut;
    scgi_temp_path         /tmp/ngx_st;

    proxy_buffer_size 4k;
    proxy_buffers 4 4k;
    proxy_busy_buffers_size 8k;

    upstream cp_backend { server 127.0.0.1:5000;  keepalive 64; }
    upstream tx_ws      { server 127.0.0.1:18080; keepalive 64; }
    upstream tx_grpc    { server 127.0.0.1:18081; keepalive 64; }

    map $http_upgrade $conn_up { default upgrade; '' close; }

    server {
        listen PORT_PLACEHOLDER;
        server_name _;

        # WebSocket transport endpoint (VLESS + WS + TLS)
        location /ws {
            access_log off;
            proxy_pass http://tx_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $conn_up;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }

        # gRPC transport endpoint (VLESS + gRPC + TLS)
        # gRPC requires HTTP/2 + keepalive + larger buffers for multiplexed streams.
        location /grpc {
            access_log off;
            grpc_pass grpc://tx_grpc;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $http_x_forwarded_for;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Keep connection alive for long-lived streams
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            grpc_connect_timeout 10s;
            # Disable buffering for real-time streaming
            grpc_buffering off;
        }

        # Control plane (dashboard, api, subscriptions, static, health)
        location / {
            proxy_pass http://cp_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
