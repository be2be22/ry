# nginx.conf — reverse proxy for CyberX VPN Panel
# nginx listens on port 3000 (Railway's $PORT) and routes:
#   - WebSocket paths (/vless-ws, /vmess-ws, /trojan-ws) → Xray (8443)
#   - everything else → Next.js (3001)
#
# NOTE: xHTTP and gRPC are NOT proxied through nginx because:
#   - xHTTP is a custom Xray protocol (not standard HTTP) — nginx can't proxy it
#   - gRPC over HTTP/2 has frame size issues with nginx → Xray
# These protocols require direct TCP access (not available on Railway's HTTPS port)
# So we only support WebSocket-based configs on Railway (which work perfectly).

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    default_type application/octet-stream;

    upstream xray_backend {
        server 127.0.0.1:8443;
        keepalive 32;
    }

    upstream nextjs_backend {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    server {
        listen 3000;
        server_name _;

        # ============================================================
        # WebSocket paths — proxy to Xray with upgrade headers
        # These are the ONLY paths that work behind Railway's HTTPS proxy
        # ============================================================
        location /vless-ws {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /vmess-ws {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /trojan-ws {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ============================================================
        # Everything else (including xHTTP, gRPC attempts) → Next.js
        # xHTTP and gRPC will get 404 from Next.js, which is expected —
        # these protocols don't work behind Railway's HTTPS reverse proxy.
        # Users should use the WebSocket-based configs instead.
        # ============================================================
        location / {
            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
