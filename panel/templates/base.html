<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پنل مدیریت Xray{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Tahoma, "Vazirmatn", "Segoe UI", sans-serif;
            background: #0f1419;
            color: #e6e6e6;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        a { color: #4fc3f7; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .btn:hover { background: #1976d2; }
        .btn-danger { background: #d32f2f; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-success { background: #388e3c; }
        .btn-success:hover { background: #2e7d32; }
        .btn-warning { background: #f57c00; }
        .btn-warning:hover { background: #ef6c00; }
        .card {
            background: #1a1f2e;
            border: 1px solid #2a3142;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 { color: #4fc3f7; margin-bottom: 15px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #2a3142; }
        th { color: #4fc3f7; font-weight: bold; }
        tr:hover { background: #232938; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-success { background: #388e3c; color: white; }
        .badge-danger { background: #d32f2f; color: white; }
        input, textarea, select {
            background: #0f1419;
            border: 1px solid #2a3142;
            color: #e6e6e6;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
        }
        input:focus, textarea:focus { outline: none; border-color: #1e88e5; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #b0b8c8; }
        .alert {
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .alert-error { background: #4a1f1f; color: #ff5252; border: 1px solid #d32f2f; }
        .alert-success { background: #1f4a1f; color: #69f0ae; border: 1px solid #388e3c; }
        .navbar {
            background: #1a1f2e;
            border-bottom: 1px solid #2a3142;
            padding: 15px 0;
            margin-bottom: 20px;
        }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .navbar h1 { color: #4fc3f7; font-size: 20px; }
        .navbar .nav-links a { margin-right: 15px; color: #b0b8c8; }
        .navbar .nav-links a:hover { color: #4fc3f7; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1f2e;
            border: 1px solid #2a3142;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #4fc3f7; }
        .stat-card .label { color: #b0b8c8; margin-top: 5px; }
        pre {
            background: #0a0d14;
            border: 1px solid #2a3142;
            border-radius: 4px;
            padding: 15px;
            overflow-x: auto;
            font-family: "Courier New", monospace;
            font-size: 13px;
            color: #b0b8c8;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 70vh;
            overflow-y: auto;
        }
        .log-line { padding: 2px 0; }
        .log-line.error { color: #ff5252; }
        .log-line.warn { color: #ffb74d; }
        .log-line.info { color: #4fc3f7; }
        .link-box {
            background: #0a0d14;
            border: 1px solid #4fc3f7;
            border-radius: 4px;
            padding: 15px;
            word-break: break-all;
            font-family: "Courier New", monospace;
            font-size: 13px;
            color: #69f0ae;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .navbar .container { flex-direction: column; gap: 10px; }
            table { font-size: 12px; }
            th, td { padding: 6px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if session.get('user') %}
    <nav class="navbar">
        <div class="container">
            <h1>⚡ پنل مدیریت Xray</h1>
            <div class="nav-links">
                <a href="{{ url_for('dashboard') }}">داشبورد</a>
                <a href="{{ url_for('view_logs') }}">لاگ‌ها</a>
                <a href="{{ url_for('logout') }}">خروج</a>
            </div>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
